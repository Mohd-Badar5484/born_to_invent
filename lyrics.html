<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Born To Invent - Lyric Library</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  body{
    background: radial-gradient(circle at top, #1a1a1a, #000000);
    color:white;
    min-height:100vh;

    opacity:0;
    transform:translateY(20px);
    transition:all 0.5s ease-in-out;
  }

  body.loaded{
    opacity:1;
    transform:translateY(0);
  }

  /* NAVBAR */
  .navbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 25px;
    background:rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    position:sticky;
    top:0;
  }

  .logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    font-size:20px;
  }

  .logo img{
    width:35px;
    height:35px;
    border-radius:50%;
  }

  .back-btn{
    padding:8px 14px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:8px;
    color:white;
    text-decoration:none;
    font-size:14px;
    transition:0.3s ease;
  }

  .back-btn:hover{
    background:rgba(255,255,255,0.18);
    transform:scale(1.05);
  }

  header{
    text-align:center;
    padding:20px;
    font-size:24px;
  }

  /* GRID */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:30px;
    max-width:1000px;
    margin:auto;
  }

  .card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    padding:20px;
    border-radius:15px;
    text-align:center;
    transition:0.3s ease;
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
  }

  .card:hover{
    transform:translateY(-6px) scale(1.03);
    background:rgba(255,255,255,0.08);
  }

  a{
    text-decoration:none;
    color:white;
    font-size:18px;
    font-weight:500;
    display:block;
  }

  .tag{
    font-size:12px;
    opacity:0.6;
    margin-top:5px;
  }

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="logo.png" alt="logo">
    born_to_invent
  </div>

  <a class="back-btn" href="index.html">← Back</a>
</div>

<header>
  🎵 Lyric Video Library
</header>

<div class="grid">

  <div class="card">
    <a href="tfbol.mp4">
      TFBOL
      <div class="tag">Click to watch & download</div>
    </a>
  </div>

  <div class="card">
    <a href="gani_bhai.mp4">
      GANI BHAI
      <div class="tag">Click to watch & download</div>
    </a>
  </div>

  <div class="card">
    <a href="lazanus.mp4">
      LAZANUS
      <div class="tag">Click to watch & download</div>
    </a>
  </div>

  <div class="card">
    <a href="lazanus2.mp4">
      LAZANUS 2
      <div class="tag">Click to watch & download</div>
    </a>
  </div>

  <div class="card">
    <a href="fuck_emiway.mp4">
      F#CK EMIWAY 
      <div class="tag">Click to watch & download</div>
    </a>
  </div>
 
</div>
 
<script>
  // smooth page load
  window.addEventListener("load", () => {
    document.body.classList.add("loaded");
  });

  // smooth page transition
document.querySelectorAll("a").forEach(link => {
  const href = link.getAttribute("href");

  // Skip video files
  if (href && href.endsWith(".mp4")) return;

  link.addEventListener("click", function(e) {
    if (href && !href.startsWith("#")) {
      e.preventDefault();
      document.body.classList.remove("loaded");

      setTimeout(() => {
        window.location.href = href;
      }, 400);
    }
  });
});
</script>

</body>
</html>
