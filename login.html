<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BKP WORLD</title>
<link rel="stylesheet" href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Enter Email">
  <input type="password" id="password" placeholder="Enter Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Sign Up</button>
  <button onclick="googleLogin()">Login with Google</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHTVxYkztqsJWUcZR2KFwOlOLuM-pYT_I",
  authDomain: "bkp-world.firebaseapp.com",
  projectId: "bkp-world",
  appId: "1:581593163998:web:97402660d48fdb48fc3a4f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 Auto redirect if already logged in
onAuthStateChanged(auth, (user) => {
  if(user){
    window.location.href = "index.html";
  }
});

// LOGIN
window.login = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => window.location.href = "index.html")
    .catch(err => alert(err.message));
}

// SIGNUP
window.signup = function(){
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => alert("Account Created 🔥"))
    .catch(err => alert(err.message));
}

// GOOGLE LOGIN
window.googleLogin = function(){
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
    .then(() => window.location.href = "index.html")
    .catch(err => alert(err.message));
}

</script>

</body>
</html>
